<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dziękujemy za wniosek | FinanceExpress</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .box {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 50px 40px;
            border-radius: 24px;
            max-width: 500px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .icon {
            font-size: 4rem;
            color: #10b981;
            margin-bottom: 20px;
        }
        h1 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 2.2rem;
            margin-bottom: 16px;
        }
        p { 
            font-size: 1.1rem; 
            color: #cbd5e1; 
            margin-bottom: 30px; 
            line-height: 1.6;
        }
        .btn {
            background: #f59e0b;
            color: #0f172a;
            padding: 14px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            display: inline-block;
            transition: all 0.3s;
        }
        .btn:hover {
            background: #fbbf24;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="icon"><i class="fas fa-check-circle"></i></div>
        <h1>Wniosek wysłany!</h1>
        <p>Dziękujemy za zaufanie. Twój wniosek został przyjęty.</p>
        <p>Skontaktujemy się z Tobą w ciągu <strong>15 minut</strong> w godzinach pracy (8:00-18:00).</p>
        <a href="index.html" class="btn">Wróć na stronę główną</a>
    </div>
</body>
</html>
